groups:
- name: vm-availability
  rules:
    - alert: VMDown
      expr: up == 0 unless on(job) (sum by (job) (up) == 0)
      for: 0s
      labels:
        severity: 'critical'
      annotations:
        summary: "Виртуальная машина {{ $labels.hostname }} ({{ $labels.instance }}) недоступна!"
        description: "Виртуальная машина {{ $labels.hostname  }} недоступна или выключена!"
        value: "{{ $value }}"

    - alert: SiteFailure
      expr: probe_http_status_code <= 199 OR probe_http_status_code >= 400
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: Blackbox probe HTTP failure (instance {{ $labels.instance }})
        description: "HTTP status code is not 200-399\n  Сайт = {{ $labels.instance }}"
